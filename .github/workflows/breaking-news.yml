name: Breaking News Update

# Regenerates www.manzill.com/breaking-news on a ~20 minute cadence.
# Scheduled workflows only run from the default branch, so the cron begins
# once this file is merged to main. Use "Run workflow" (workflow_dispatch)
# to test on demand before then.

on:
  schedule:
    - cron: "*/20 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: breaking-news
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Generate breaking-news page
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_MODEL: ${{ vars.GROQ_MODEL }}
        run: python scripts/build_breaking_news.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add breaking/ breaking-news/index.html
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update Jaipur breaking news"
            git push
          fi
