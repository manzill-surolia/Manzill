name: Breaking News Update

# Regenerates www.manzill.com/breaking-news on a ~20 minute cadence.
# Scheduled workflows only run from the default branch, so the cron begins
# once this file is merged to main. Use "Run workflow" (workflow_dispatch)
# to test on demand before then.

on:
  schedule:
    - cron: "*/20 * * * *"
  workflow_dispatch:
    inputs:
      force_query:
        description: "Force a story to lead by keywords (e.g. Rajasthan High Court bomb threat). Blank = auto-pick."
        required: false
        default: ""
      force_url:
        description: "Force a specific article URL to lead (also fill force_headline)."
        required: false
        default: ""
      force_headline:
        description: "Headline for the forced URL (required if force_url is set)."
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: breaking-news
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Generate breaking-news page
        env:
          # Primary key + optional extra keys for the reporter→editor pipeline. The build
          # rotates across whatever is set (see _groq_keys); absent secrets resolve to empty.
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_API_KEY_2: ${{ secrets.GROQ_API_KEY_2 }}
          GROQ_API_KEY_3: ${{ secrets.GROQ_API_KEY_3 }}
          GROQ_API_KEYS: ${{ secrets.GROQ_API_KEYS }}
          GROQ_MODEL: ${{ vars.GROQ_MODEL }}
          # Optional manual pin from a "Run workflow" dispatch; empty on scheduled runs.
          FORCE_QUERY: ${{ github.event.inputs.force_query }}
          FORCE_URL: ${{ github.event.inputs.force_url }}
          FORCE_HEADLINE: ${{ github.event.inputs.force_headline }}
        run: python scripts/build_breaking_news.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A breaking
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update Jaipur breaking news"
            git push
          fi
